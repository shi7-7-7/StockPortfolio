services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      

  web:
    build: .
    command: ["uv", "run", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend


volumes:
  postgres_data: